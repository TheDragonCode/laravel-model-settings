laravel: '@testbench'

providers:
    - DragonCode\LaravelModelSettings\ModelSettingsServiceProvider

migrations:
    - database/migrations

seeders:
    - Workbench\Database\Seeders\DatabaseSeeder

workbench:
    install: true
    health: false
    discovers:
        web: false
        api: true
        config: true
        commands: false
        factories: false
        views: false
