laravel: '@testbench'

providers:
    - DragonCode\LaravelModelSettings\ModelSettingsServiceProvider

migrations:
    - database/migrations

workbench:
    install: true
    health: false
    discovers:
        web: false
        api: false
        commands: false
        components: false
        factories: true
        views: false
    build:
        - create-sqlite-db
        - db-wipe
        - migrate-fresh
