version: 2
updates:
    -
        package-ecosystem: github-actions
        directory: /
        schedule:
            interval: daily
        labels:
            - dependabot
    -
        package-ecosystem: composer
        directory: /
        schedule:
            interval: weekly
        labels:
            - dependencies
    -
        package-ecosystem: npm
        directory: /docs
        schedule:
            interval: weekly
        labels:
            - dependencies
